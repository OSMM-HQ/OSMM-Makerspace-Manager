services:
  # The SaaS edge is the only service that publishes host ports.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile.saas:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ${CADDY_CERTS_DIR:-./deploy/certs}:/etc/caddy/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  # Keep the S3 API and console on the private Compose network.
  minio:
    ports: !reset []

  backend:
    environment:
      PLATFORM_DOMAIN_SUFFIX: ${PLATFORM_DOMAIN_SUFFIX:-.space-works.tech}
      BEHIND_TRUSTED_PROXY: "true"
      PLATFORM_ORIGIN_HOST: ${PLATFORM_ORIGIN_HOST:-origin.space-works.tech}
      INFRA_HOSTS: ${INFRA_HOSTS:-localhost,127.0.0.1,backend,backend:8000,origin.space-works.tech,files.space-works.tech,space-works.tech}
      PLATFORM_STAFF_ORIGINS: ${PLATFORM_STAFF_ORIGINS:-https://space-works.tech}
      DOMAIN_CHANGE_COOLDOWN_SECONDS: ${DOMAIN_CHANGE_COOLDOWN_SECONDS:-86400}
      ENABLE_HTTPS: "true"
      TRUST_X_FORWARDED_PROTO: "true"
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://*.space-works.tech,https://space-works.tech}
      AWS_S3_PUBLIC_ENDPOINT_URL: https://files.space-works.tech
      PUBLIC_IMAGE_BASE_URL: https://files.space-works.tech/public-images

  # migrate/worker/beat reference the base &backend-env anchor, which does NOT pick up
  # the backend override above. They must still know this is a MANAGED instance:
  #   - migrate runs 0029_reconcile_selfhost_domains (self-host branch must stay dormant), and
  #   - worker/beat load AppConfig.ready(), whose reconcile post_save signal branches on it.
  # Without the suffix these processes would treat the managed box as self-host and
  # auto-verify unproven custom domains. Keep in sync with backend's PLATFORM_DOMAIN_SUFFIX.
  migrate:
    environment:
      PLATFORM_DOMAIN_SUFFIX: ${PLATFORM_DOMAIN_SUFFIX:-.space-works.tech}

  worker:
    environment:
      PLATFORM_DOMAIN_SUFFIX: ${PLATFORM_DOMAIN_SUFFIX:-.space-works.tech}

  beat:
    environment:
      PLATFORM_DOMAIN_SUFFIX: ${PLATFORM_DOMAIN_SUFFIX:-.space-works.tech}

  frontend:
    ports: !reset []
    environment:
      TENANT_API_URL: /api
      TENANT_ORIGIN_BOOTSTRAP: "true"

volumes:
  caddy_data:
  caddy_config:
