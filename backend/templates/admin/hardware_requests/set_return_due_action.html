{% extends "admin/base_site.html" %}

{% block content %}
<form method="post" action="{{ request.path }}">
  {% csrf_token %}
  <input type="hidden" name="action" value="{{ action_name }}">
  {% for obj in queryset %}
    <input type="hidden" name="{{ action_checkbox_name }}" value="{{ obj.pk }}">
  {% endfor %}

  <fieldset class="module aligned">
    <div class="form-row">
      <label for="id_return_due_at">Return due at:</label>
      <input id="id_return_due_at" type="datetime-local" name="return_due_at" required>
    </div>
  </fieldset>

  <div class="submit-row">
    <input type="submit" name="apply" value="Set return due date">
  </div>
</form>
{% endblock %}
