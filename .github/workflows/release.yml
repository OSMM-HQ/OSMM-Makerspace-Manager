name: Release

# Versioned releases are driven straight from `main` — no separate release branch.
#
# How to cut a release:
#   1. Edit the VERSION file to the new version, e.g. 1.0.0  (semantic version X.Y.Z).
#   2. Commit and push to `main`.
# Changing VERSION on `main` triggers this workflow, which:
#   - builds and pushes the Docker images:
#       ghcr.io/<owner>/osmm-backend  :X.Y.Z  :X.Y  :latest
#       ghcr.io/<owner>/osmm-frontend :X.Y.Z  :X.Y  :latest
#   - creates the `vX.Y.Z` git tag and a matching GitHub Release (auto-generated
#     notes from the commits since the previous tag).
#
# This is the ONLY workflow that publishes images. An ordinary push to `main`
# (no VERSION change) builds nothing.

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: backend
            image: osmm-backend
          - context: frontend
            image: osmm-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Read & validate VERSION
        id: ver
        run: |
          V=$(tr -d '[:space:]' < VERSION)
          if ! printf '%s' "$V" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error file=VERSION::VERSION must be a semantic version like 1.0.0 (got '$V')"
            exit 1
          fi
          echo "full=$V" >> "$GITHUB_OUTPUT"
          echo "minor=${V%.*}" >> "$GITHUB_OUTPUT"
          echo "Releasing version $V"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.full }}
            type=raw,value=${{ steps.ver.outputs.minor }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Runs once after both images are published: tags the release commit and
  # creates the matching GitHub Release so the Releases page reflects each version.
  github-release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read VERSION
        id: ver
        run: echo "full=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
      - name: Create tag & GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.full }}
          name: v${{ steps.ver.outputs.full }}
          generate_release_notes: true
          make_latest: true
          body: |
            Docker images published to GHCR:

            - `ghcr.io/${{ github.repository_owner }}/osmm-backend:${{ steps.ver.outputs.full }}`
            - `ghcr.io/${{ github.repository_owner }}/osmm-frontend:${{ steps.ver.outputs.full }}`
