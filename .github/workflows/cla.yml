name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A fine-grained PAT with Contents + Pull requests + Issues write on this repo,
          # stored as the PERSONAL_ACCESS_TOKEN repo secret. Required so the action can
          # record signatures and manage PR comments/labels.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/OSMM-HQ/OSMM-Makerspace-Manager/blob/main/.github/CLA.md'
          branch: 'main'
          allowlist: 'Shaan-Shoukath,dependabot[bot]'
          custom-notsigned-prcomment: 'Thanks for your pull request! Before we can merge it, please read our [Contributor License Agreement](https://github.com/OSMM-HQ/OSMM-Makerspace-Manager/blob/main/.github/CLA.md) and [Contributor Benefits](https://github.com/OSMM-HQ/OSMM-Makerspace-Manager/blob/main/.github/CONTRIBUTOR-BENEFITS.md), then sign below.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
