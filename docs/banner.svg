<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="OSMM — Open Systems Makerspace Manager">
  <title>OSMM — Open Systems Makerspace Manager</title>
  <defs>
    <style>
      .word { font-family: 'Space Grotesk', 'Segoe UI', system-ui, -apple-system, sans-serif; font-weight: 700; fill: #ffffff; }
      .eyebrow { font-family: 'Space Grotesk', 'Segoe UI', system-ui, -apple-system, sans-serif; font-weight: 600; fill: #7dd3fc; letter-spacing: 4px; }
      .headline { font-family: 'Space Grotesk', 'Segoe UI', system-ui, -apple-system, sans-serif; font-weight: 700; fill: #ffffff; }
      .sub { font-family: 'Space Grotesk', 'Segoe UI', system-ui, -apple-system, sans-serif; font-weight: 400; fill: #9a988f; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="340" rx="20" fill="#0c0d10"/>

  <!-- crate logomark (vector, font-independent) -->
  <g transform="translate(74,46) scale(1.65)">
    <polygon points="8,22 2,10 28,10 32,22" fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
    <polygon points="32,22 36,10 62,10 56,22" fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
    <rect x="8" y="22" width="48" height="34" rx="5" fill="none" stroke="#ffffff" stroke-width="3.2"/>
    <rect x="12" y="27" width="18" height="11" rx="2.5" fill="#7dd3fc"/>
    <rect x="34" y="27" width="18" height="11" rx="2.5" fill="#fcdf46"/>
    <rect x="12" y="42" width="18" height="11" rx="2.5" fill="#74dd9c"/>
    <rect x="34" y="42" width="18" height="11" rx="2.5" fill="#f9a8d4"/>
  </g>

  <!-- wordmark -->
  <text class="word" x="214" y="138" font-size="78" letter-spacing="3">OSMM</text>

  <!-- eyebrow + headline + sub -->
  <text class="eyebrow" x="76" y="216" font-size="15">OPEN SYSTEMS MAKERSPACE MANAGER</text>
  <text class="headline" x="74" y="262" font-size="34">Every part, tool and project — on one shelf.</text>
  <text class="sub" x="76" y="300" font-size="18">Self-hostable inventory &amp; 3D-printing manager for makerspaces — no spreadsheets.</text>

  <!-- decorative compartment cluster (echoes the logomark palette) -->
  <g transform="translate(1012,118)">
    <rect x="0"  y="0"  width="60" height="40" rx="8" fill="#7dd3fc" opacity="0.92"/>
    <rect x="68" y="0"  width="60" height="40" rx="8" fill="#fcdf46" opacity="0.92"/>
    <rect x="0"  y="48" width="60" height="40" rx="8" fill="#74dd9c" opacity="0.92"/>
    <rect x="68" y="48" width="60" height="40" rx="8" fill="#f9a8d4" opacity="0.92"/>
  </g>
</svg>
